<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ filename }} — Performative Assessment</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f1f5f9;
  color: #1e293b;
  min-height: 100dvh;
}

header {
  background: #1d4ed8;
  color: #fff;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

header a {
  color: rgba(255,255,255,.8);
  text-decoration: none;
  font-size: .84rem;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px;
  transition: background .12s;
  white-space: nowrap;
}

header a:hover { background: rgba(255,255,255,.12); }

.report-meta {
  flex: 1;
}

.report-meta h1 {
  font-size: .95rem;
  font-weight: 600;
}

.report-meta p {
  font-size: .78rem;
  color: rgba(255,255,255,.65);
  margin-top: 2px;
}

main {
  max-width: 860px;
  margin: 28px auto;
  padding: 0 20px 40px;
}

.report-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
}

.report-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid #e2e8f0;
  background: #fafbfc;
  font-size: .8rem;
  color: #64748b;
}

pre.report-content {
  padding: 24px;
  font-family: 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
  font-size: .83rem;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  color: #1e293b;
  tab-size: 2;
}
</style>
</head>
<body>

<header>
  <a href="/admin">← Dashboard</a>
  <div class="report-meta">
    <h1>{{ filename }}</h1>
    <p>Student: {{ username }}</p>
  </div>
</header>

<main>
  <div class="report-card">
    <div class="report-toolbar">
      <span>Markdown report</span>
      <span>{{ admin_name }}</span>
    </div>
    <pre class="report-content">{{ content }}</pre>
  </div>
</main>

</body>
</html>
