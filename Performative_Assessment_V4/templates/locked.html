<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Locked — Performative Assessment</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f1f5f9;
  color: #1e293b;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.lock-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 40px 36px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,.06);
}

.lock-icon {
  font-size: 2.8rem;
  margin-bottom: 18px;
}

h1 {
  font-size: 1.15rem;
  font-weight: 700;
  color: #991b1b;
  margin-bottom: 14px;
}

p {
  font-size: .88rem;
  color: #64748b;
  line-height: 1.65;
  margin-bottom: 10px;
}

.warning-box {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 8px;
  padding: 14px 16px;
  margin: 18px 0;
}

.warning-box p {
  color: #7f1d1d;
  margin: 0;
  font-size: .85rem;
}

.footer-note {
  font-size: .78rem;
  color: #94a3b8;
  margin-top: 18px;
  margin-bottom: 0;
}
</style>
</head>
<body>

<div class="lock-card">
  <div class="lock-icon">🔒</div>
  <h1>Access Temporarily Locked</h1>

  <div class="warning-box">
    <p>Too many failed administrator login attempts have been detected from your network location.</p>
  </div>

  <p>Access to the sign-in page has been suspended for 15 minutes.</p>
  <p>If this was not you, please contact your system administrator.</p>

  <p class="footer-note">Performative Assessment System</p>
</div>

</body>
</html>
